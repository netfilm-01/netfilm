<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NETFILM V4</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">

    <div class="left">
        <h1>NETFILM V4</h1>
    </div>

    <div class="center">
        <input id="search" placeholder="Film ara...">
    </div>

    <div class="right">
        <div class="ad-box">REKLAM ALANI 1</div>
        <div class="ad-box">REKLAM ALANI 2</div>
        <div class="ad-box">REKLAM ALANI 3</div>
    </div>

</header>

<!-- HERO -->
<div id="featured"></div>

<!-- SEARCH RESULTS (only visible while searching) -->
<div class="section" id="sec-search" style="display:none">
    <h2 class="section-title">🔎 Arama Sonuçları</h2>
    <div class="row" id="searchResults"></div>
</div>

<!-- POPULAR -->
<div class="section" id="sec-popular">
    <h2 class="section-title">🔥 Popüler</h2>
    <div class="row" id="popular"></div>
</div>

<!-- ACTION -->
<div class="section" id="sec-action">
    <h2 class="section-title">⚡ Aksiyon</h2>
    <div class="row" id="action"></div>
</div>

<!-- FANTASY -->
<div class="section" id="sec-fantasy">
    <h2 class="section-title">🧙 Fantastik</h2>
    <div class="row" id="fantasy"></div>
</div>

<!-- COMEDY -->
<div class="section" id="sec-comedy">
    <h2 class="section-title">😂 Komedi</h2>
    <div class="row" id="comedy"></div>
</div>

<!-- HORROR -->
<div class="section" id="sec-horror">
    <h2 class="section-title">👻 Korku</h2>
    <div class="row" id="horror"></div>
</div>

<!-- SCI-FI -->
<div class="section" id="sec-scifi">
    <h2 class="section-title">🚀 Bilim Kurgu</h2>
    <div class="row" id="scifi"></div>
</div>

<!-- TOP RATED -->
<div class="section" id="sec-toprated">
    <h2 class="section-title">⭐ En Çok Oy Alanlar</h2>
    <div class="row" id="toprated"></div>
</div>

<!-- FAVORITES -->
<div class="section" id="sec-favorites">
    <h2 class="section-title">❤️ Favoriler</h2>
    <div class="row" id="favorites"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span id="close">×</span>
        <div id="modal-body"></div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
