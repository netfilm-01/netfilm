<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetFilm</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    background:#e50914;
    padding:20px;
    text-align:center;
    font-size:40px;
    font-weight:bold;
}

.container{
    width:90%;
    max-width:1200px;
    margin:30px auto;
}

.movie{
    background:#222;
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;
    transition:.3s;
}

.movie:hover{
    transform:scale(1.02);
}

h2{
    margin-bottom:10px;
}

p{
    color:#ccc;
}
</style>

</head>
<body>

<header>NETFILM</header>

<div class="container">

<div class="movie">
<h2>Interstellar</h2>
<p>IMDb ⭐ 8.7</p>
</div>

<div class="movie">
<h2>Inception</h2>
<p>IMDb ⭐ 8.8</p>
</div>

<div class="movie">
<h2>The Batman</h2>
<p>IMDb ⭐ 7.8</p>
</div>

</div>

</body>
</html>
