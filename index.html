<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NETFILM V3</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>NETFILM V3</h1>

    <input id="search" placeholder="Film ara...">

    <!-- 🎬 GENRE MENÜ -->
    <nav class="genres">
        <button onclick="filterGenre('all')">Tümü</button>
        <button onclick="filterGenre('aksiyon')">Aksiyon</button>
        <button onclick="filterGenre('fantastik')">Fantastik</button>
        <button onclick="filterGenre('komedi')">Komedi</button>
        <button onclick="filterGenre('korku')">Korku</button>
        <button onclick="filterGenre('bilimkurgu')">Bilim Kurgu</button>
    </nav>
</header>

<!-- HERO -->
<div id="featured"></div>

<h2 class="section-title">🔥 Popüler</h2>
<div class="row" id="movies"></div>

<h2 class="section-title">⭐ En Çok Oy Alanlar</h2>
<div class="row" id="toprated"></div>

<h2 class="section-title">❤️ Favoriler</h2>
<div class="row" id="favorites"></div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span id="close">×</span>
        <div id="modal-body"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
